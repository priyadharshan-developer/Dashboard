<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #e2e8f0;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .btn {
            background: linear-gradient(45deg, #9333ea, #c084fc);
            padding: 10px 18px;
            border-radius: 10px;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(168,85,247,0.5);
        }

        .input {
            background: #020617;
            padding: 10px;
            border-radius: 10px;
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="flex min-h-screen">

<!-- Sidebar -->
<div class="w-64 p-6" style="background: linear-gradient(180deg,#1e293b,#232a45);">

<h2 class="text-2xl font-bold mb-10 text-purple-300">🎓 Student</h2>

<ul class="space-y-3 text-gray-200">

<li class="p-3 rounded-lg bg-purple-500/30 border-l-4 border-purple-400">
<a href="index.html">Dashboard</a>
</li>

<li class="p-3 hover:bg-white/10 rounded-lg">
<a href="marks.html">Marks</a>
</li>

<li class="p-3 hover:bg-white/10 rounded-lg">
<a href="attendance.html">Attendance</a>
</li>

</ul>
</div>

<!-- Main Content -->
<div class="flex-1 p-8 space-y-8">

<!-- Header -->
<div class="card flex justify-between items-center">
<h1 class="text-xl font-semibold">Dashboard</h1>

<button onclick="logout()" class="btn">Logout</button>
</div>

<!-- Add Student -->
<div class="card">

<h3 class="mb-4">Add Student</h3>

<div class="flex gap-3">

<input id="name" class="input w-full" placeholder="Name">

<input id="attendance" class="input w-40" type="number" placeholder="Attendance">

<button onclick="addStudent()" class="btn">Add</button>

</div>

</div>

<!-- Select Student -->
<select id="studentSelect"
onchange="showStudentData(this.value)"
class="input w-40">
<option value="">Select</option>
</select>

<!-- Cards -->
<div class="grid grid-cols-3 gap-6">

<div class="card text-center">
<p>Name</p>
<h2 id="studentName" class="text-2xl mt-2 text-purple-300">-</h2>
</div>

<div class="card text-center">
<p>Attendance</p>
<h2 id="studentAttendance" class="text-2xl mt-2 text-green-400">-</h2>
</div>

<div class="card text-center">
<p>Average</p>
<h2 id="studentAverage" class="text-2xl mt-2 text-pink-400">-</h2>
</div>

</div>

<!-- Chart -->
<div class="card">
<h3 class="mb-4">Performance Overview</h3>
<canvas id="chart"></canvas>
</div>

</div>
</div>

<script>
function login() {
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}
</script>

<script src="js/script.js"></script>

</body>
</html>

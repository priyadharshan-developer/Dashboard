<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #e2e8f0;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .input {
            background: #020617;
            padding: 10px;
            border-radius: 10px;
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="flex min-h-screen">

<!-- Sidebar -->
<div class="w-64 p-6" style="background: linear-gradient(180deg,#1e293b,#232a45);">

<h2 class="text-2xl font-bold mb-10 text-purple-300">🎓 Student</h2>

<ul class="space-y-3 text-gray-200">

<li class="p-3 hover:bg-white/10 rounded-lg">
<a href="index.html">Dashboard</a>
</li>

<li class="p-3 hover:bg-white/10 rounded-lg">
<a href="marks.html">Marks</a>
</li>

<li class="p-3 rounded-lg bg-purple-500/30 border-l-4 border-purple-400">
Attendance
</li>

</ul>
</div>

<!-- Main -->
<div class="flex-1 p-8 space-y-8">

<div class="card">
<h1 class="text-xl font-semibold">Attendance</h1>
</div>

<!-- SELECT -->
<select id="studentSelect" class="input w-48"></select>

<!-- SHOW ATTENDANCE -->
<div class="card">

<h2 id="attendanceValue" class="text-lg">
Select a student
</h2>

<!-- Progress bar -->
<div class="w-full bg-gray-700 rounded-full h-4 mt-4">
    <div id="attendanceBar"
        class="bg-green-400 h-4 rounded-full"
        style="width:0%">
    </div>
</div>

</div>

</div>
</div>

<script src="js/script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Marks</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #e2e8f0;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .btn {
            background: linear-gradient(45deg, #9333ea, #c084fc);
            padding: 10px 18px;
            border-radius: 10px;
            color: white;
            border: none;
            cursor: pointer;
        }

        .input {
            background: #020617;
            padding: 10px;
            border-radius: 10px;
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="flex min-h-screen">

<!-- Sidebar -->
<div class="w-64 p-6" style="background: linear-gradient(180deg,#1e293b,#232a45);">

<h2 class="text-2xl font-bold mb-10 text-purple-300">🎓 Student</h2>

<ul class="space-y-3 text-gray-200">

<li class="p-3 hover:bg-white/10 rounded-lg">
<a href="index.html">Dashboard</a>
</li>

<li class="p-3 rounded-lg bg-purple-500/30 border-l-4 border-purple-400">
Marks
</li>

<li class="p-3 hover:bg-white/10 rounded-lg">
<a href="attendance.html">Attendance</a>
</li>

</ul>
</div>

<!-- Main -->
<div class="flex-1 p-8 space-y-8">

<div class="card">
<h1 class="text-xl font-semibold">Marks Management</h1>
</div>

<!-- SELECT STUDENT -->
<select id="studentSelect" class="input w-48"></select>

<!-- ADD SUBJECT -->
<div class="card">
<h3 class="mb-4">Add / Update Subject</h3>

<div class="flex gap-3">
<input id="subjectName" class="input w-full" placeholder="Subject">
<input id="subjectMarks" class="input w-40" type="number" placeholder="Marks">

<button onclick="addOrUpdateSubject()" class="btn">Save</button>
</div>
</div>

<!-- TABLE -->
<div class="card">

<table class="w-full text-left">
<thead>
<tr class="border-b border-gray-600">
<th>Subject</th>
<th>Marks</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>
</div>

<script src="js/script.js"></script>

</body>
</html>
